services:
  cgenie-al:
    build:
      context: .
      dockerfile: Dockerfile.v2
    image: cgenie-al:v2
    container_name: cgenie-lpia
    volumes:
      - ./output:/data/output
    environment:
      - CGENIE_ROOT=/opt/cgenie
      - CGENIE_OUTPUT=/data/output
    stdin_open: true
    tty: true
    command: /bin/bash

  cgenie-lpia-run:
    extends: cgenie-al
    container_name: cgenie-lpia-run
    command: /opt/cgenie/scripts/run-lpia.sh
    profiles: [batch]

  cgenie-all:
    extends: cgenie-al
    container_name: cgenie-all-run
    command: /opt/cgenie/scripts/run-all.sh
    profiles: [all]
